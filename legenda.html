<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Legendas | Amaré Ateliê</title><style>body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#fffaf7,#f7f2ee);color:#2b211d;padding:18px 12px}.app{max-width:620px;margin:auto}.top{text-align:center}.badge{display:inline-block;background:#fff;padding:9px 15px;border-radius:999px;box-shadow:0 8px 22px rgba(73,44,36,.08);font-weight:800;color:#b86b77}h1{font-size:clamp(2rem,8vw,3.2rem);margin:10px 0;letter-spacing:-.04em}.card{background:#fff;border:1px solid #eaded6;border-radius:24px;box-shadow:0 16px 36px rgba(73,44,36,.12);padding:20px;margin:18px 0}label{display:block;margin:14px 0 7px;font-weight:900}input,select,textarea{width:100%;box-sizing:border-box;border:2px solid #eaded6;border-radius:15px;padding:14px;font-size:1rem}textarea{min-height:90px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.preview{white-space:pre-wrap;background:#f9f4f0;border:1px solid #eaded6;border-radius:18px;padding:16px;line-height:1.55;min-height:260px}.btn{border:0;border-radius:16px;padding:16px 14px;font-size:1.05rem;font-weight:900;cursor:pointer;margin-top:10px;width:100%}.copy{background:#372b27;color:#fff}.clear{background:#eee3dc;color:#4b3b35}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#372b27;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;transition:.25s}.toast.show{transform:translateX(-50%) translateY(0)}@media(max-width:460px){.grid{grid-template-columns:1fr}}</style></head><body><main class="app"><header class="top"><span class="badge">✨ Amaré Ateliê</span><h1>Gerador de Legenda</h1><p>Monte uma legenda pronta para Instagram em poucos segundos.</p></header><section class="card"><div class="grid"><div><label>Tipo de peça</label><input id="peca" placeholder="Ex.: bolsa, cropped, sousplat"></div><div><label>Cor</label><input id="cor" placeholder="Ex.: bege, rosa, cru"></div></div><div class="grid"><div><label>Disponibilidade</label><select id="disp"><option>Encomenda</option><option>Pronta entrega</option><option>Última unidade</option><option>Peça personalizada</option></select></div><div><label>Estilo da legenda</label><select id="estilo"><option>Delicada</option><option>Vendedora</option><option>Elegante</option><option>Simples</option></select></div></div><div class="grid"><div><label>Valor</label><input id="valor" placeholder="Opcional"></div><div><label>Prazo</label><input id="prazo" placeholder="Ex.: 10 dias úteis"></div></div><label>Diferencial da peça</label><textarea id="detalhe" placeholder="Ex.: feita à mão, acabamento reforçado, combina com looks de verão..."></textarea><label>Chamada final</label><input id="chamada" placeholder="Ex.: Chama no direct e garanta a sua"></section><section class="card"><h2>Legenda pronta</h2><div class="preview" id="preview"></div><button class="btn copy" id="copiar">Copiar legenda</button><button class="btn clear" id="limpar">Limpar tudo</button></section></main><div class="toast" id="toast">Copiado!</div><script>const ids=['peca','cor','disp','estilo','valor','prazo','detalhe','chamada'];const $=id=>document.getElementById(id);function v(id){return ($(id).value||'').trim()}function legenda(){const p=v('peca')||'peça em crochê',c=v('cor'),d=v('disp'),e=v('estilo'),val=v('valor'),pr=v('prazo'),det=v('detalhe'),cha=v('chamada')||'Chama no direct e faça sua encomenda';let txt='';if(e==='Delicada'){txt=`Uma peça feita à mão carrega tempo, carinho e cuidado em cada detalhe. 🧶✨\n\nEssa ${p}${c?' na cor '+c:''} foi pensada para deixar seu dia mais especial.`}else if(e==='Vendedora'){txt=`Nova opção da Amaré Ateliê para você se apaixonar! 🧶💕\n\n${p.charAt(0).toUpperCase()+p.slice(1)}${c?' na cor '+c:''}, perfeita para quem ama peça artesanal com estilo e personalidade.`}else if(e==='Elegante'){txt=`Crochê artesanal com acabamento delicado e presença única. ✨\n\nA ${p}${c?' na cor '+c:''} é uma peça versátil, charmosa e feita com atenção aos detalhes.`}else{txt=`${p.charAt(0).toUpperCase()+p.slice(1)}${c?' na cor '+c:''} feita à mão pela Amaré Ateliê. 🧶`}
if(det)txt+='\n\n'+det;if(d)txt+='\n\nDisponibilidade: '+d+'.';if(val)txt+='\nValor: '+val+'.';if(pr)txt+='\nPrazo: '+pr+'.';txt+='\n\n'+cha+' 💕\n\n#AmareAtelie #Croche #CrocheArtesanal #FeitoAMao #Artesanato #CrocheComAmor';return txt}function render(){$('preview').textContent=legenda()}function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}ids.forEach(id=>{ $(id).addEventListener('input',render);$(id).addEventListener('change',render)});$('copiar').onclick=async()=>{try{await navigator.clipboard.writeText(legenda());toast('Legenda copiada!')}catch(e){toast('Não foi possível copiar')}};$('limpar').onclick=()=>{ids.forEach(id=>$(id).value='');$('disp').value='Encomenda';$('estilo').value='Delicada';render();toast('Campos limpos!')};render();</script></body></html>
