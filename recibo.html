<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Recibo | Amaré Ateliê</title><style>body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f7f2ee;color:#2b211d;padding:18px 12px}.app{max-width:620px;margin:auto}.top{text-align:center}h1{font-size:clamp(2rem,8vw,3rem);margin:8px 0}.card{background:#fff;border:1px solid #eaded6;border-radius:24px;box-shadow:0 16px 36px rgba(73,44,36,.12);padding:20px;margin:18px 0}label{display:block;margin:14px 0 7px;font-weight:900}input,select,textarea{width:100%;box-sizing:border-box;border:2px solid #eaded6;border-radius:15px;padding:14px;font-size:1rem}textarea{min-height:80px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.preview{white-space:pre-wrap;background:#f9f4f0;border:1px solid #eaded6;border-radius:18px;padding:16px;line-height:1.55;min-height:220px}.btn{border:0;border-radius:16px;padding:16px 14px;font-size:1.05rem;font-weight:900;cursor:pointer;margin-top:10px;width:100%}.copy{background:#372b27;color:#fff}.clear{background:#eee3dc;color:#4b3b35}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(120px);background:#372b27;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;transition:.25s}.toast.show{transform:translateX(-50%) translateY(0)}@media(max-width:460px){.grid{grid-template-columns:1fr}}</style></head><body><main class="app"><header class="top"><h1>Recibo Amaré Ateliê</h1><p>Gerador simples para copiar e enviar à cliente.</p></header><section class="card"><label>Nome da cliente</label><input id="cliente"><label>Peça / encomenda</label><input id="peca"><div class="grid"><div><label>Valor total</label><input id="total" type="number" min="0" step="0.01"></div><div><label>Valor pago</label><input id="pago" type="number" min="0" step="0.01"></div></div><div class="grid"><div><label>Forma de pagamento</label><select id="forma"><option></option><option>Pix</option><option>Dinheiro</option><option>Cartão</option><option>A combinar</option></select></div><div><label>Status</label><select id="status"><option>Pago total</option><option>Sinal pago</option><option>Pagamento parcial</option><option>Restante pendente</option></select></div></div><label>Data</label><input id="data" type="date"><label>Observações</label><textarea id="obs"></textarea></section><section class="card"><div class="preview" id="preview"></div><button class="btn copy" id="copiar">Copiar recibo</button><button class="btn clear" id="limpar">Limpar tudo</button></section></main><div class="toast" id="toast">Copiado!</div><script>const ids=['cliente','peca','total','pago','forma','status','data','obs'];const $=id=>document.getElementById(id);function v(id){return ($(id).value||'').trim()}function n(id){const x=Number(String(v(id)).replace(',','.'));return Number.isFinite(x)?x:0}function moeda(x){return x.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function dataBR(s){if(!s)return'';const [a,m,d]=s.split('-');return d+'/'+m+'/'+a}function texto(){const total=n('total'),pago=n('pago'),rest=Math.max(total-pago,0);let t='RECIBO SIMPLES - AMARÉ ATELIÊ\n\n';if(v('cliente'))t+='Cliente: '+v('cliente')+'\n';if(v('peca'))t+='Peça/encomenda: '+v('peca')+'\n';t+='Valor total: '+moeda(total)+'\nValor pago: '+moeda(pago)+'\nValor restante: '+moeda(rest)+'\n';if(v('forma'))t+='Forma de pagamento: '+v('forma')+'\n';t+='Status: '+v('status')+'\n';if(v('data'))t+='Data: '+dataBR(v('data'))+'\n';if(v('obs'))t+='Observações: '+v('obs')+'\n';t+='\nAmaré Ateliê agradece a preferência.';return t}function render(){$('preview').textContent=texto()}function toast(t){$('toast').textContent=t;$('toast').classList.add('show');setTimeout(()=>$('toast').classList.remove('show'),1700)}ids.forEach(id=>{ $(id).addEventListener('input',render);$(id).addEventListener('change',render)});$('copiar').onclick=async()=>{try{await navigator.clipboard.writeText(texto());toast('Recibo copiado!')}catch(e){toast('Não foi possível copiar')}};$('limpar').onclick=()=>{ids.forEach(id=>$(id).value='');$('data').value=new Date().toISOString().slice(0,10);render();toast('Campos limpos!')};$('data').value=new Date().toISOString().slice(0,10);render();</script></body></html>
